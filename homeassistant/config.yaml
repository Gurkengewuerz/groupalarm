name: GroupAlarm MQTT Bridge
description: Polls the GroupAlarm API for open alarms and publishes new alarms to an MQTT broker.
version: "1.0.0"
slug: groupalarm
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
url: https://github.com/Gurkengewuerz/groupalarm
image: "ghcr.io/Gurkengewuerz/groupalarm"
options:
  groupalarm_apikey: ""
  groupalarm_orgs: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mqtt_topic: "pager/groupalarm/{org}"
schema:
  groupalarm_apikey: str
  groupalarm_orgs: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str?
  mqtt_password: password?
  mqtt_topic: str
